<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golden Gloves Bruchsal — Boxing</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
  <canvas id="game" width="960" height="540"></canvas>
  <script src="art/boxers.js"></script>
  <script src="settings.js"></script>
  <script src="game.js"></script>
  <script>
    // Only load analytics in production — skip localhost and file:// dev sessions
    if (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1' && location.protocol !== 'file:') {
      const s = document.createElement('script');
      s.async = true;
      s.src = '//gc.zgo.at/count.js';
      s.setAttribute('data-goatcounter', 'https://johannes-staehlin.goatcounter.com/count');
      document.body.appendChild(s);
    }
  </script>
</body>
</html>
